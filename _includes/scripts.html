<script>
  // --- Site configuration from Jekyll data ---
  const SITE = {
    ownerName: "{{ site.data.site.owner_name }}",
    tagline: "{{ site.data.site.tagline }}",
    email: "{{ site.data.site.email }}",
    location: "{{ site.data.site.location }}",
    githubUser: "{{ site.data.site.github_user }}",
    avatar: "{{ site.data.site.avatar }}",
    social: {
      github: "{{ site.data.site.social.github }}",
      x: "{{ site.data.site.social.x }}",
      huggingface: "{{ site.data.site.social.huggingface }}",
      reddit: "{{ site.data.site.social.reddit }}",
      npm: "{{ site.data.site.social.npm }}",
      linkedin: "{{ site.data.site.social.linkedin }}",
      email: "{{ site.data.site.social.email }}"
    }
  };

  // --- Theme (applied before DOMContentLoaded to prevent FOUC) ---
  (() => {
    const saved = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const theme = saved || (prefersDark ? 'dark' : 'light');
    document.documentElement.classList.add(theme);
  })();

  const applyTheme = (t) => {
    const root = document.documentElement;
    root.classList.remove('dark', 'light');
    root.classList.add(t);
    const icon = document.querySelector('.i-theme');
    if (icon) icon.textContent = t === 'dark' ? '🌙' : '🌞';
    localStorage.setItem('theme', t);
  };

  const initTheme = () => {
    const saved = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    applyTheme(saved || (prefersDark ? 'dark' : 'light'));
  };

  // --- Populate dynamic content ---
  const byId = (id) => document.getElementById(id);

  // --- Mobile menu ---
  const setupMobileMenu = () => {
    const toggle = byId('mobile-menu-toggle');
    const menu   = byId('mobile-menu');
    if (!toggle || !menu) return;
    toggle.addEventListener('click', () => {
      const isOpen = menu.classList.toggle('hidden');
      toggle.setAttribute('aria-expanded', String(!isOpen));
    });
    // Close on nav-link click
    menu.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        menu.classList.add('hidden');
        toggle.setAttribute('aria-expanded', 'false');
      });
    });
  };

  // --- Contact form ---
  const setupContactForm = () => {
    const form = byId('contactForm');
    if (!form) return;
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const data    = new FormData(form);
      const name    = (data.get('name')    || '').trim();
      const email   = (data.get('email')   || '').trim();
      const subject = (data.get('subject') || '').trim() || 'Contact from WCNegentropy.com';
      const message = (data.get('message') || '').trim();

      if (!name || !email || !message) {
        alert('Please fill in all required fields.');
        return;
      }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        alert('Please enter a valid email address.');
        return;
      }

      const body = `Name: ${name}%0D%0AEmail: ${email}%0D%0A%0D%0AMessage:%0D%0A${message}`;
      window.location.href = `mailto:${SITE.email}?subject=${encodeURIComponent(subject)}&body=${body}`;

      const btn = form.querySelector('button[type="submit"]');
      if (btn) {
        const orig = btn.textContent;
        btn.textContent = '✓ Opening email client…';
        btn.disabled = true;
        setTimeout(() => {
          btn.textContent = orig;
          btn.disabled = false;
          form.reset();
        }, 3000);
      }
    });
  };

  // --- Init ---
  document.addEventListener('DOMContentLoaded', () => {
    initTheme();
    byId('theme-toggle')?.addEventListener('click', () => {
      const next = document.documentElement.classList.contains('dark') ? 'light' : 'dark';
      applyTheme(next);
    });
    const yearEl = byId('year');
    if (yearEl) yearEl.textContent = new Date().getFullYear();
    setupMobileMenu();
    setupContactForm();
  });
</script>
