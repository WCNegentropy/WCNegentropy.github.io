<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>{% if page.title %}{{ page.title }}{% else %}{{ site.title }} — {{ site.owner.tagline }}{% endif %}</title>
<meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
<link rel="canonical" href="{{ page.url | absolute_url }}">
<meta name="theme-color" content="{{ site.theme_color }}">

<!-- Security Headers -->
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="X-Frame-Options" content="DENY">
<meta http-equiv="X-XSS-Protection" content="1; mode=block">
<meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
<meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=()">

<!-- Open Graph / Twitter -->
<meta property="og:type" content="website" />
<meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }} — {{ site.owner.tagline }}{% endif %}" />
<meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}" />
<meta property="og:image" content="{{ '/images/social/og-image.png' | absolute_url }}" />
<meta property="og:url" content="{{ page.url | absolute_url }}" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:site" content="@WCNegentropy" />

<!-- Resource Preloading for Performance -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" href="{{ '/assets/css/main.css' | relative_url }}" as="style">
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" as="style">
<link rel="dns-prefetch" href="https://cdn.jsdelivr.net">

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<!-- Compiled Tailwind CSS -->
<link href="{{ '/assets/css/main.css' | relative_url }}" rel="stylesheet" />

<!-- Alpine.js for interactive components (Command Palette) -->
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>

<!-- MathJax 3 for LaTeX rendering of field equations -->
<script>
  MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']]
    },
    options: {
      skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
    }
  };
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<!-- Dynamic JSON-LD Structured Data — per-collection schema injection -->
{% if page.schema_type == "ScholarlyArticle" %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "ScholarlyArticle",
  "name": "{{ page.title | escape }}",
  "description": "{{ page.description | escape }}",
  "url": "{{ page.url | absolute_url }}",
  "author": {
    "@type": "Organization",
    "name": "WCNEGENTROPY HOLDINGS LLC",
    "url": "https://wcnegentropy.com"
  },
  "publisher": {
    "@type": "Organization",
    "name": "WCNEGENTROPY HOLDINGS LLC",
    "url": "https://wcnegentropy.com"
  }{% if page.tags %},
  "keywords": "{{ page.tags | join: ', ' }}"{% endif %}{% if page.license %},
  "license": "{{ page.license | escape }}"{% endif %}
}
</script>
{% elsif page.schema_type == "SoftwareSourceCode" %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "SoftwareSourceCode",
  "name": "{{ page.title | escape }}",
  "description": "{{ page.description | escape }}",
  "url": "{{ page.url | absolute_url }}",
  "author": {
    "@type": "Organization",
    "name": "WCNEGENTROPY HOLDINGS LLC",
    "url": "https://wcnegentropy.com"
  }{% if page.repo_url %},
  "codeRepository": "{{ page.repo_url }}"{% endif %}{% if page.license %},
  "license": "{{ page.license | escape }}"{% endif %}{% if page.tags %},
  "keywords": "{{ page.tags | join: ', ' }}"{% endif %}
}
</script>
{% elsif page.schema_type == "BlogPosting" %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": "{{ page.title | escape }}",
  "description": "{{ page.description | escape }}",
  "url": "{{ page.url | absolute_url }}",
  "author": {
    "@type": "Organization",
    "name": "WCNEGENTROPY HOLDINGS LLC",
    "url": "https://wcnegentropy.com"
  }{% if page.date %},
  "datePublished": "{{ page.date | date_to_xmlschema }}"{% endif %}{% if page.tags %},
  "keywords": "{{ page.tags | join: ', ' }}"{% endif %}
}
</script>
{% else %}
<!-- Default Organization + SoftwareApplication schema for non-collection pages -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "WCNEGENTROPY HOLDINGS LLC",
  "url": "https://wcnegentropy.com",
  "logo": "https://github.com/WCNegentropy.png",
  "description": "A negentropic attractor — deep-tech IP holding company and research lab building unified field theories, magnetic dynamics frameworks, deterministic code generators, and novel AI architectures.",
  "sameAs": [
    "https://github.com/WCNegentropy",
    "https://twitter.com/WCNegentropy",
    "https://huggingface.co/WCNegentropy",
    "https://www.npmjs.com/package/@wcnegentropy/cli",
    "https://www.reddit.com/r/WCNegentropy/"
  ],
  "knowsAbout": [
    "Unified Field Theory",
    "Magnetic Field Dynamics",
    "Plasma Physics",
    "Entropy-Driven Systems",
    "Open Source Software",
    "Deterministic Code Generation",
    "Transformer Architectures",
    "Post-Quantum Cryptography",
    "Procedural Generation"
  ]
}
</script>

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "SoftwareApplication",
  "name": "retro-vibecoder",
  "alternateName": "Universal Project Generator (UPG)",
  "applicationCategory": "DeveloperApplication",
  "operatingSystem": "Windows, macOS, Linux",
  "offers": {
    "@type": "Offer",
    "price": "0",
    "priceCurrency": "USD"
  },
  "softwareVersion": "0.2.2",
  "author": {
    "@type": "Organization",
    "name": "WCNEGENTROPY HOLDINGS LLC",
    "url": "https://wcnegentropy.com"
  },
  "url": "https://github.com/WCNegentropy/retro-vibecoder",
  "downloadUrl": "https://www.npmjs.com/package/@wcnegentropy/cli",
  "description": "CLI tool and cross-platform Tauri desktop app that procedurally generates full working boilerplate tech stacks from a single deterministic seed. 40+ strategies, 7 archetypes, 12 languages.",
  "license": "https://opensource.org/licenses/MIT"
}
</script>
{% endif %}

{% seo %}
