<!-- Command Palette (⌘K Navigation) -->
<div x-data="commandPalette()" 
     x-on:keydown.window.prevent.ctrl.k="toggle()" 
     x-on:keydown.window.prevent.meta.k="toggle()"
     x-on:keydown.escape.window="open = false"
     @toggle-command-palette.window="toggle()"
     x-show="open"
     x-cloak
     class="fixed inset-0 z-50 flex items-start justify-center pt-16 px-4 sm:pt-24"
     style="display: none;">
  
  <!-- Backdrop -->
  <div x-show="open"
       x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0"
       x-transition:enter-end="opacity-100"
       x-transition:leave="transition ease-in duration-150"
       x-transition:leave-start="opacity-100"
       x-transition:leave-end="opacity-0"
       @click="open = false"
       class="fixed inset-0 bg-slate-900/50 dark:bg-slate-900/50 backdrop-blur-sm"></div>
  
  <!-- Command Palette Modal -->
  <div x-show="open"
       x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0 scale-95"
       x-transition:enter-end="opacity-100 scale-100"
       x-transition:leave="transition ease-in duration-150"
       x-transition:leave-start="opacity-100 scale-100"
       x-transition:leave-end="opacity-0 scale-95"
       class="relative w-full max-w-2xl bg-white dark:bg-slate-900 rounded-2xl shadow-2xl border border-brand-300 dark:border-slate-700 overflow-hidden">
    
    <!-- Search Input -->
    <div class="flex items-center gap-3 px-4 py-3 border-b border-brand-300 dark:border-slate-700">
      <span class="text-slate-600 dark:text-slate-500 text-xl">🔍</span>
      <input 
        x-ref="searchInput"
        x-model="search"
        @input="filterItems()"
        type="text" 
        placeholder="Type to search..." 
        class="flex-1 bg-transparent border-none outline-none text-slate-900 dark:text-slate-100 placeholder-slate-600 dark:placeholder-slate-500"
        autofocus
      />
      <kbd class="hidden sm:inline-block px-2 py-1 text-xs font-semibold text-slate-700 dark:text-slate-400 bg-brand-100 dark:bg-slate-800 rounded">ESC</kbd>
    </div>
    
    <!-- Results -->
    <div class="max-h-96 overflow-y-auto">
      <template x-if="filteredItems.length === 0">
        <div class="px-4 py-8 text-center text-slate-700 dark:text-slate-400">
          <div class="text-4xl mb-2">🤷</div>
          <div>No results found</div>
        </div>
      </template>
      
      <div class="py-2">
        <template x-for="(item, index) in filteredItems" :key="index">
          <a :href="item.url"
             @click="navigate(item.url)"
             class="flex items-center gap-3 px-4 py-3 hover:bg-brand-100 dark:hover:bg-slate-800 transition-colors cursor-pointer">
            <span class="text-2xl" x-text="item.icon"></span>
            <div class="flex-1">
              <div class="font-semibold text-slate-900 dark:text-slate-100" x-text="item.title"></div>
              <div class="text-sm text-slate-700 dark:text-slate-400" x-text="item.description"></div>
            </div>
            <kbd class="hidden sm:inline-block px-2 py-1 text-xs font-mono text-slate-600 dark:text-slate-500 bg-brand-100 dark:bg-slate-800 rounded" x-text="item.shortcut || ''"></kbd>
          </a>
        </template>
      </div>
    </div>
    
    <!-- Footer -->
    <div class="flex items-center justify-between px-4 py-2 text-xs text-slate-700 dark:text-slate-400 border-t border-brand-300 dark:border-slate-700 bg-brand-50 dark:bg-slate-900/50">
      <div class="flex items-center gap-2">
        <kbd class="px-2 py-1 bg-white dark:bg-slate-800 rounded border border-brand-200 dark:border-slate-700">⌘K</kbd>
        <span>or</span>
        <kbd class="px-2 py-1 bg-white dark:bg-slate-800 rounded border border-brand-200 dark:border-slate-700">Ctrl K</kbd>
        <span>to toggle</span>
      </div>
      <div class="flex items-center gap-2">
        <kbd class="px-2 py-1 bg-white dark:bg-slate-800 rounded border border-brand-200 dark:border-slate-700">↑↓</kbd>
        <span>to navigate</span>
        <kbd class="px-2 py-1 bg-white dark:bg-slate-800 rounded border border-brand-200 dark:border-slate-700">↵</kbd>
        <span>to select</span>
      </div>
    </div>
  </div>
</div>

<script>
  function commandPalette() {
    return {
      open: false,
      search: '',
      items: [
        // Navigation
        { icon: '🏠', title: 'Home', description: 'Return to homepage', url: '/' },
        { icon: '🔬', title: 'Core IP', description: 'Research & software pillars', url: '/#ip-grid' },
        { icon: '🤖', title: 'AI Models', description: 'HuggingFace models', url: '/#models' },
        { icon: '💬', title: 'Contact', description: 'Get in touch', url: '/#contact' },
        { icon: '🔗', title: 'Links', description: 'Social media and profiles', url: '/#links' },

        // Research
        { icon: '🔬', title: 'MAGUFT', description: 'Grand Unified Field Theory', url: '/research/maguft/' },
        { icon: '🧲', title: 'MagRot', description: 'Magnetic Field Dynamics Framework', url: '/research/magrot/' },

        // Software
        { icon: '⚡', title: 'retro-vibecoder', description: 'Universal Project Generator — CLI & Desktop App', url: '/software/retro-vibecoder/' },

        // Projects (external)
        { icon: '🔬', title: 'MAGUFT (GitHub)', description: 'Unified field theory repo', url: 'https://github.com/WCNegentropy/MAGUFT' },
        { icon: '🧲', title: 'MagRot (GitHub)', description: 'Magnetic dynamics simulator', url: 'https://github.com/WCNegentropy/magrot' },
        { icon: '⚡', title: 'retro-vibecoder (GitHub)', description: 'Universal Project Generator', url: 'https://github.com/WCNegentropy/retro-vibecoder' },
        { icon: '🤖', title: 'BitTransformerLM', description: 'Binary transformer architecture', url: 'https://huggingface.co/WCNegentropy/BitTransformerLM' },
        { icon: '🌊', title: 'WrinkleBrane', description: 'Wave interference transformer', url: 'https://huggingface.co/WCNegentropy/WrinkleBrane' },

        // External
        { icon: '🐙', title: 'GitHub', description: 'Open source repositories', url: 'https://github.com/WCNegentropy' },
        { icon: '📦', title: 'NPM', description: '@wcnegentropy/cli package', url: 'https://www.npmjs.com/package/@wcnegentropy/cli' },
        { icon: '🤗', title: 'HuggingFace', description: 'AI models and research', url: 'https://huggingface.co/WCNegentropy' },
        { icon: '𝕏', title: 'X / Twitter', description: 'Updates and thoughts', url: 'https://x.com/WCNegentropy' },
        { icon: '🤖', title: 'Reddit', description: 'Community discussions', url: 'https://reddit.com/user/WCNegentropy' },

        // Pages
        { icon: '📄', title: 'Privacy Policy', description: 'How we handle your data', url: '/privacy' },
        { icon: '📋', title: 'Terms of Service', description: 'Legal terms and conditions', url: '/terms' },
      ],
      filteredItems: [],
      
      init() {
        this.filteredItems = this.items;
      },
      
      toggle() {
        this.open = !this.open;
        if (this.open) {
          this.$nextTick(() => {
            this.$refs.searchInput.focus();
          });
        }
      },
      
      filterItems() {
        const query = this.search.toLowerCase().trim();
        
        if (!query) {
          this.filteredItems = this.items;
          return;
        }
        
        this.filteredItems = this.items.filter(item => {
          return item.title.toLowerCase().includes(query) ||
                 item.description.toLowerCase().includes(query);
        });
      },
      
      navigate(url) {
        // Validate URL to prevent XSS attacks
        if (url.startsWith('http://') || url.startsWith('https://')) {
          window.open(url, '_blank', 'noopener,noreferrer');
        } else if (url.startsWith('/') || url.startsWith('#')) {
          // Safe internal navigation
          window.location.href = url;
        } else {
          // Invalid URL format - ignore
          console.warn('Invalid URL format:', url);
        }
        this.open = false;
        this.search = '';
      }
    };
  }
</script>

<style>
  [x-cloak] {
    display: none !important;
  }
</style>
