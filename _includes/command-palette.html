<!-- Command Palette (⌘K Navigation) -->
<div x-data="commandPalette()"
     x-on:keydown.window.prevent.ctrl.k="toggle()"
     x-on:keydown.window.prevent.meta.k="toggle()"
     x-on:keydown.escape.window="open = false"
     @toggle-command-palette.window="toggle()"
     x-show="open"
     x-cloak
     class="fixed inset-0 z-50 flex items-start justify-center pt-16 px-4 sm:pt-24"
     style="display: none;"
     role="dialog"
     aria-modal="true"
     aria-label="Command palette">

  <!-- Backdrop -->
  <div x-show="open"
       x-transition:enter="transition ease-out duration-150"
       x-transition:enter-start="opacity-0"
       x-transition:enter-end="opacity-100"
       x-transition:leave="transition ease-in duration-100"
       x-transition:leave-start="opacity-100"
       x-transition:leave-end="opacity-0"
       @click="open = false"
       class="fixed inset-0"
       style="background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);">
  </div>

  <!-- Modal -->
  <div x-show="open"
       x-transition:enter="transition ease-out duration-150"
       x-transition:enter-start="opacity-0 scale-95 translate-y-2"
       x-transition:enter-end="opacity-100 scale-100 translate-y-0"
       x-transition:leave="transition ease-in duration-100"
       x-transition:leave-start="opacity-100 scale-100 translate-y-0"
       x-transition:leave-end="opacity-0 scale-95 translate-y-2"
       class="relative w-full max-w-xl overflow-hidden shadow-2xl"
       style="background: var(--surface-1); border: 1px solid var(--border); border-radius: 0.5rem;">

    <!-- Search input -->
    <div class="flex items-center gap-3 px-4 py-3 border-b" style="border-color: var(--border);">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"
           class="size-4 flex-shrink-0" style="color: var(--text-tertiary);" aria-hidden="true">
        <path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 1 0 0 11 5.5 5.5 0 0 0 0-11ZM2 9a7 7 0 1 1 12.452 4.391l3.328 3.329a.75.75 0 1 1-1.06 1.06l-3.329-3.328A7 7 0 0 1 2 9Z" clip-rule="evenodd"/>
      </svg>
      <input
        x-ref="searchInput"
        x-model="search"
        @input="filterItems()"
        type="text"
        placeholder="Search pages, projects, links…"
        class="flex-1 bg-transparent border-none outline-none text-sm"
        style="color: var(--text-primary);"
        autofocus
      />
      <kbd class="hidden sm:inline-block px-1.5 py-0.5 text-2xs font-mono rounded border"
           style="background: var(--surface-2); border-color: var(--border); color: var(--text-tertiary);">ESC</kbd>
    </div>

    <!-- Results -->
    <div class="max-h-80 overflow-y-auto py-1.5">
      <template x-if="filteredItems.length === 0">
        <div class="px-4 py-8 text-center text-sm" style="color: var(--text-secondary);">
          No results found
        </div>
      </template>
      <template x-for="(item, index) in filteredItems" :key="index">
        <a :href="item.url"
           @click="navigate(item.url)"
           class="flex items-center gap-3 px-4 py-2.5 transition-colors duration-100 cursor-pointer focus-visible:outline-none"
           style="color: var(--text-primary);"
           x-bind:style="{ 'background': '' }"
           @mouseenter="$el.style.background = 'var(--surface-2)'"
           @mouseleave="$el.style.background = ''"
           @focus="$el.style.background = 'var(--surface-2)'"
           @blur="$el.style.background = ''">
          <span class="text-base w-6 text-center flex-shrink-0" x-text="item.icon"></span>
          <div class="flex-1 min-w-0">
            <div class="text-sm font-medium truncate" x-text="item.title"></div>
            <div class="text-xs truncate" style="color: var(--text-tertiary);" x-text="item.description"></div>
          </div>
           <kbd class="hidden sm:inline-block px-1.5 py-0.5 text-2xs font-mono rounded border"
                style="background: var(--surface-2); border-color: var(--border); color: var(--text-secondary);"
                x-text="item.shortcut || ''"></kbd>
        </a>
      </template>
    </div>

    <!-- Footer hints -->
    <div class="flex items-center justify-between px-4 py-2 border-t"
         style="border-color: var(--border); background: var(--surface-2);">
      <div class="flex items-center gap-2 text-2xs" style="color: var(--text-tertiary);">
        <kbd class="px-1.5 py-0.5 rounded border"
             style="background: var(--surface-1); border-color: var(--border); color: var(--text-secondary); font-family: monospace;">⌘K</kbd>
        <span>toggle</span>
        <kbd class="px-1.5 py-0.5 rounded border"
             style="background: var(--surface-1); border-color: var(--border); color: var(--text-secondary); font-family: monospace;">↑↓</kbd>
        <span>navigate</span>
        <kbd class="px-1.5 py-0.5 rounded border"
             style="background: var(--surface-1); border-color: var(--border); color: var(--text-secondary); font-family: monospace;">↵</kbd>
        <span>select</span>
      </div>
    </div>
  </div>
</div>

<script>
  function commandPalette() {
    return {
      open: false,
      search: '',
      items: [
        { icon: '🏠', title: 'Home',          description: 'Return to homepage',                   url: '/' },
        { icon: '🔬', title: 'Research & IP', description: 'Core research pillars',                url: '/#ip-grid' },
        { icon: '🤖', title: 'AI Models',     description: 'HuggingFace models',                   url: '/#models' },
        { icon: '💬', title: 'Contact',       description: 'Get in touch',                         url: '/#contact' },
        { icon: '🔬', title: 'MAGUFT',        description: 'Grand Unified Field Theory',           url: '/research/maguft/' },
        { icon: '🧲', title: 'MagRot',        description: 'Magnetic Field Dynamics Framework',    url: '/research/magrot/' },
        { icon: '⚡', title: 'retro-vibecoder', description: 'Universal Project Generator',        url: '/software/retro-vibecoder/' },
        { icon: '🔬', title: 'MAGUFT (GitHub)',  description: 'Unified field theory repo',         url: 'https://github.com/WCNegentropy/MAGUFT' },
        { icon: '🧲', title: 'MagRot (GitHub)',  description: 'Magnetic dynamics simulator',       url: 'https://github.com/WCNegentropy/magrot' },
        { icon: '⚡', title: 'UPG (GitHub)',     description: 'Universal Project Generator',       url: 'https://github.com/WCNegentropy/retro-vibecoder' },
        { icon: '🤖', title: 'BitTransformerLM', description: 'Binary transformer architecture',   url: 'https://huggingface.co/WCNegentropy/BitTransformerLM' },
        { icon: '🌊', title: 'WrinkleBrane',     description: 'Wave interference transformer',     url: 'https://huggingface.co/WCNegentropy/WrinkleBrane' },
        { icon: '🐙', title: 'GitHub',           description: 'Open source repositories',          url: 'https://github.com/WCNegentropy' },
        { icon: '📦', title: 'NPM',             description: '@wcnegentropy/cli package',          url: 'https://www.npmjs.com/package/@wcnegentropy/cli' },
        { icon: '🤗', title: 'HuggingFace',     description: 'AI models and research',             url: 'https://huggingface.co/WCNegentropy' },
        { icon: '𝕏',  title: 'X / Twitter',     description: 'Updates and thoughts',               url: 'https://x.com/WCNegentropy' },
        { icon: '📄', title: 'Privacy Policy',  description: 'How we handle your data',            url: '/privacy' },
        { icon: '📋', title: 'Terms of Service', description: 'Legal terms and conditions',        url: '/terms' },
      ],
      filteredItems: [],

      init() {
        this.filteredItems = this.items;
      },

      toggle() {
        this.open = !this.open;
        if (this.open) {
          this.$nextTick(() => this.$refs.searchInput.focus());
        }
      },

      filterItems() {
        const q = this.search.toLowerCase().trim();
        this.filteredItems = q
          ? this.items.filter(i =>
              i.title.toLowerCase().includes(q) || i.description.toLowerCase().includes(q))
          : this.items;
      },

      navigate(url) {
        if (url.startsWith('http://') || url.startsWith('https://')) {
          window.open(url, '_blank', 'noopener,noreferrer');
        } else if (url.startsWith('/') || url.startsWith('#')) {
          window.location.href = url;
        } else {
          console.warn('Invalid URL format:', url);
        }
        this.open = false;
        this.search = '';
        this.filteredItems = this.items;
      }
    };
  }
</script>

<style>
  [x-cloak] { display: none !important; }
</style>
