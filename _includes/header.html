<header class="sticky top-0 z-40 border-b transition-all duration-200"
        style="background-color: color-mix(in srgb, var(--canvas) 85%, transparent); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-color: var(--border);">
  <div class="mx-auto max-w-7xl px-5 sm:px-8 h-14 flex items-center justify-between gap-4">

    <!-- Identity -->
    <a href="/" class="flex items-center gap-2.5 group flex-shrink-0" aria-label="WCNegentropy home">
      <img src="{{ site.owner.avatar }}"
           class="size-7 rounded-full ring-1 transition-all duration-200"
           style="ring-color: var(--accent);"
           alt="{{ site.owner.name }}" loading="eager" width="28" height="28">
      <span class="font-display font-semibold text-sm tracking-tight transition-colors duration-150"
            style="font-family: 'Space Grotesk', sans-serif;"
            >WCNegentropy</span>
    </a>

    <!-- Nav (desktop) -->
    <nav class="hidden md:flex items-center gap-1" aria-label="Primary navigation">
      <a href="/research/maguft/"
         class="meta-label px-3 py-1.5 rounded-md transition-colors duration-150 hover:bg-surface-2{% if page.url contains 'maguft' %} bg-surface-2{% endif %}"
         {% if page.url contains 'maguft' %}aria-current="page" style="color: var(--accent);"{% else %}style="color: var(--text-secondary);"{% endif %}>MAGUFT</a>
      <a href="/research/magrot/"
         class="meta-label px-3 py-1.5 rounded-md transition-colors duration-150 hover:bg-surface-2{% if page.url contains 'magrot' %} bg-surface-2{% endif %}"
         {% if page.url contains 'magrot' %}aria-current="page" style="color: var(--accent);"{% else %}style="color: var(--text-secondary);"{% endif %}>MagRot</a>
      <a href="/software/retro-vibecoder/"
         class="meta-label px-3 py-1.5 rounded-md transition-colors duration-150 hover:bg-surface-2{% if page.url contains 'retro-vibecoder' %} bg-surface-2{% endif %}"
         {% if page.url contains 'retro-vibecoder' %}aria-current="page" style="color: var(--accent);"{% else %}style="color: var(--text-secondary);"{% endif %}>retro-vibecoder</a>
      <a href="/models/"
         class="meta-label px-3 py-1.5 rounded-md transition-colors duration-150 hover:bg-surface-2{% if page.url contains 'models' %} bg-surface-2{% endif %}"
         {% if page.url contains 'models' %}aria-current="page" style="color: var(--accent);"{% else %}style="color: var(--text-secondary);"{% endif %}>Models</a>
      <a href="/contact/"
         class="meta-label px-3 py-1.5 rounded-md transition-colors duration-150 hover:bg-surface-2{% if page.url contains 'contact' %} bg-surface-2{% endif %}"
         {% if page.url contains 'contact' %}aria-current="page" style="color: var(--accent);"{% else %}style="color: var(--text-secondary);"{% endif %}>Contact</a>
    </nav>

    <!-- Controls -->
    <div class="flex items-center gap-2">
      <!-- ⌘K trigger -->
      <button
        x-data
        @click="$dispatch('toggle-command-palette')"
        class="hidden md:inline-flex items-center gap-2 rounded-md border px-2.5 py-1 text-2xs font-mono transition-all duration-150 hover:border-accent"
        style="border-color: var(--border); color: var(--text-tertiary);"
        aria-label="Open command palette (Ctrl K)">
        <span>⌘K</span>
      </button>

      <!-- Mobile menu toggle -->
      <button id="mobile-menu-toggle"
        class="md:hidden inline-flex items-center justify-center size-8 rounded-md border transition-all duration-150"
        style="border-color: var(--border); color: var(--text-secondary);"
        aria-label="Open mobile navigation"
        aria-expanded="false">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="size-4">
          <path fill-rule="evenodd" d="M2 4.75A.75.75 0 012.75 4h14.5a.75.75 0 010 1.5H2.75A.75.75 0 012 4.75zM2 10a.75.75 0 01.75-.75h14.5a.75.75 0 010 1.5H2.75A.75.75 0 012 10zm0 5.25a.75.75 0 01.75-.75h14.5a.75.75 0 010 1.5H2.75a.75.75 0 01-.75-.75z" clip-rule="evenodd"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Mobile nav -->
  <div id="mobile-menu"
       class="hidden md:hidden border-t"
       style="border-color: var(--border); background-color: var(--surface-1);">
    <nav class="px-5 py-3 flex flex-col gap-1" aria-label="Mobile navigation">
      <a href="/research/maguft/" class="meta-label px-3 py-2 rounded-md"
         {% if page.url contains 'maguft' %}aria-current="page" style="color: var(--accent); background-color: var(--surface-2);"{% else %}style="color: var(--text-secondary);"{% endif %}>MAGUFT</a>
      <a href="/research/magrot/" class="meta-label px-3 py-2 rounded-md"
         {% if page.url contains 'magrot' %}aria-current="page" style="color: var(--accent); background-color: var(--surface-2);"{% else %}style="color: var(--text-secondary);"{% endif %}>MagRot</a>
      <a href="/software/retro-vibecoder/" class="meta-label px-3 py-2 rounded-md"
         {% if page.url contains 'retro-vibecoder' %}aria-current="page" style="color: var(--accent); background-color: var(--surface-2);"{% else %}style="color: var(--text-secondary);"{% endif %}>retro-vibecoder</a>
      <a href="/models/" class="meta-label px-3 py-2 rounded-md"
         {% if page.url contains 'models' %}aria-current="page" style="color: var(--accent); background-color: var(--surface-2);"{% else %}style="color: var(--text-secondary);"{% endif %}>Models</a>
      <a href="/contact/" class="meta-label px-3 py-2 rounded-md"
         {% if page.url contains 'contact' %}aria-current="page" style="color: var(--accent); background-color: var(--surface-2);"{% else %}style="color: var(--text-secondary);"{% endif %}>Contact</a>
    </nav>
  </div>
</header>
