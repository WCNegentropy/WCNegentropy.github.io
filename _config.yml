# Jekyll Configuration for WCNegentropy — Deep Tech IP Holdco & Research Lab
title: "WCNegentropy"
description: "A negentropic attractor — developer tools, experimental AI systems, and deep-tech software."
url: "https://wcnegentropy.com"
baseurl: ""

# Site owner information
owner:
  name: "WCNegentropy"
  tagline: "Negentropy • Developer Tools • AI Systems • Deep Tech"
  email: "contact@wcnegentropy.com"
  location: "Distributed"
  github_user: "WCNegentropy"
  avatar: "https://github.com/WCNegentropy.png"

# Jekyll settings
markdown: kramdown
kramdown:
  math_engine: mathjax
highlighter: rouge
sass:
  sass_dir: _sass
  style: compressed

# Plugins
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

# Collections — Hub and Spoke architecture
collections:
  research:
    output: true
    permalink: /research/:path/
  software:
    output: true
    permalink: /software/:path/
  posts:
    output: true
    permalink: /blog/:year/:month/:day/:title/

# Default frontmatter per collection
defaults:
  - scope:
      path: ""
      type: "research"
    values:
      layout: "research"
      schema_type: "ScholarlyArticle"
  - scope:
      path: ""
      type: "software"
    values:
      layout: "software"
      schema_type: "SoftwareSourceCode"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "page"
      schema_type: "BlogPosting"

# Exclude from build
exclude:
  - README.md
  - CLAUDE.md
  - .gitignore
  - .devcontainer/
  - .vscode/
  - .github/
  - Gemfile
  - Gemfile.lock
  - vendor/
  - node_modules/
  - package.json
  - package-lock.json
  - tailwind.config.js
  - _includes/input.css
  - "*.backup"
  - index.html.backup
  - algorithms.html.backup

# Include assets in build
include:
  - assets/

# Theme color for browsers
theme_color: "#0ea5e9"
